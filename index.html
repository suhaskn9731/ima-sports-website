<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* VIDEO HEADER */

.hero{
position:relative;
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.hero-content{
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.logo{
width:70px;
}

.title-box{
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:40px;
margin:10px 0;
}

.tagline{
font-size:16px;
opacity:0.9;
}

button{
margin-top:15px;
padding:14px 30px;
background:#ef4444;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

/* SPORTS SECTION */

.sports-section{
padding:60px 20px;
text-align:center;

/* paint background */

background-image:url("https://www.transparenttextures.com/patterns/paint-splatter.png");
background-color:#0f172a;
}

.cards{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
margin-top:40px;
}

/* white sports boxes */

.card{
background:white;
color:black;
padding:18px;
width:85%;
max-width:420px;
border-radius:12px;
font-size:18px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.04);
}

/* footer */

footer{
text-align:center;
padding:30px;
background:#020617;
}

</style>

</head>

<body>

<!-- HERO SECTION -->

<header class="hero">

<video autoplay muted loop>
<source src="sports-video.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<img src="logo1.jpeg" class="logo">

<div class="title-box">

<h1>IMA Sports Fest</h1>

<p class="tagline">
Compete • Conquer • Celebrate
</p>

<button>Register Now</button>

</div>

<img src="logo2.jpeg" class="logo">

</div>

</header>

<!-- SPORTS EVENTS -->

<section class="sports-section">

<h2>Sports Events</h2>

<div class="cards">

<div class="card">Football</div>

<div class="card">Volleyball</div>

<div class="card">Throwball</div>

<div class="card">Kho Kho</div>

<div class="card">Basketball</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>Designed by Suhas K N</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
