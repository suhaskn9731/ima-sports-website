<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER SECTION */

.hero{
position:relative;
width:100%;
height:70vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* dark overlay */

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* header text */

.hero-text{
animation:fadeUp 1.5s ease;
}

.hero-text h1{
font-size:42px;
margin-bottom:10px;
}

.hero-text p{
font-size:18px;
opacity:0.9;
}

/* animation */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* SPORTS SECTION */

.sports-section{
padding:60px 20px;
text-align:center;
background-image:url("https://www.transparenttextures.com/patterns/paint-splatter.png");
background-color:#0f172a;
}

.cards{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:40px;
}

/* sports boxes */

.card{
background:white;
color:black;
padding:18px;
width:85%;
max-width:420px;
border-radius:12px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* footer */

footer{
text-align:center;
padding:30px;
background:#020617;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="hero">

<img src="header.png">

<div class="hero-text">

<h1>IMA Sports Fest</h1>

<p>Compete • Conquer • Celebrate</p>

</div>

</header>

<!-- SPORTS EVENTS -->

<section class="sports-section">

<h2>Sports Events</h2>

<div class="cards">

<div class="card">⚽ Football</div>

<div class="card">🏐 Volleyball</div>

<div class="card">🤾 Throwball</div>

<div class="card">🏃 Kho Kho</div>

<div class="card">🏀 Basketball</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>Designed by Suhas K N</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
