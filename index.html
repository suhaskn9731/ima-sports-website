<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- INTRO SCREEN -->

<div id="intro">
<h1 class="intro-title">IMA SPORTS FEST</h1>
</div>



<!-- HERO SECTION -->

<section class="hero">

<video autoplay muted loop class="video-bg">
<source src="hero.MP4" type="video/mp4">
</video>

<div class="overlay"></div>

<canvas id="particles"></canvas>



<!-- HERO CONTENT -->

<div class="hero-content">

<div class="glass">

<h1 class="title spotlight-text">IMA SPORTS FEST</h1>

<p class="tagline">
Compete • Conquer • Celebrate
</p>

<a href="#events" class="btn">
Explore Events
</a>

</div>

</div>

<div class="scroll">↓</div>

</section>



<!-- EVENTS -->

<section id="events" class="events">

<h2>Sports Events</h2>

<div class="cards">

<div class="card">
<img src="football.jpg">
<h3>Football</h3>
</div>

<div class="card">
<img src="volleyball.jpg">
<h3>Volleyball</h3>
</div>

<div class="card">
<img src="basketball.jpg">
<h3>Basketball</h3>
</div>

<div class="card">
<img src="kho-kho.jpg">
<h3>Kho Kho</h3>
</div>

<div class="card">
<img src="throwball.jpg">
<h3>Throwball</h3>
</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
