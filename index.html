<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER POSTER */

.hero{
width:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.hero img{
width:100%;
max-height:650px;
object-fit:cover;
}

/* SPORTS SECTION */

.sports-section{
padding:60px 20px;
text-align:center;
background:#0f172a;
background-image:url("https://www.transparenttextures.com/patterns/paint-splatter.png");
}

.cards{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:40px;
}

/* SPORT CARD */

.card{
background:white;
color:black;
padding:18px;
width:85%;
max-width:420px;
border-radius:12px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:#020617;
}

</style>

</head>

<body>

<!-- HEADER IMAGE -->

<header class="hero">

<img src="header.png">

</header>

<!-- SPORTS EVENTS -->

<section class="sports-section">

<h2>Sports Events</h2>

<div class="cards">

<div class="card">⚽ Football</div>

<div class="card">🏐 Volleyball</div>

<div class="card">🤾 Throwball</div>

<div class="card">🏃 Kho Kho</div>

<div class="card">🏀 Basketball</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>Designed by Suhas K N</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
