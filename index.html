<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HERO VIDEO SECTION */

.hero{
position:relative;
height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.hero-overlay{
background:rgba(0,0,0,0.6);
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

/* HERO CONTENT */

.hero-content{
position:relative;
display:flex;
align-items:center;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.logo{
width:80px;
height:auto;
}

.title-box{
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:50px;
margin:10px 0;
}

.tagline{
font-size:18px;
opacity:0.9;
}

button{
margin-top:20px;
padding:15px 30px;
background:#ef4444;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#dc2626;
}

/* SPORTS SECTION */

section{
padding:60px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:25px;
width:220px;
border-radius:12px;
font-size:18px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
background:#334155;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:#020617;
margin-top:40px;
}

</style>

</head>

<body>

<!-- HERO SECTION -->

<header class="hero">

<video autoplay muted loop class="hero-video">
<source src="50109-459915579_medium.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<img src="logo1.jpeg" class="logo">

<div class="title-box">

<h1>IMA Sports Fest</h1>

<p class="tagline">
Compete • Conquer • Celebrate
</p>

<button onclick="alert('Registration opening soon!')">
Register Now
</button>

</div>

<img src="logo2.jpeg" class="logo">

</div>

</header>

<!-- SPORTS EVENTS -->

<section>

<h2>Sports Events</h2>

<div class="cards">

<div class="card">Cricket</div>
<div class="card">Football</div>
<div class="card">Badminton</div>
<div class="card">Volleyball</div>
<div class="card">Table Tennis</div>
<div class="card">Athletics</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>IMA Sports Club</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
