<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HERO SECTION */

.hero{
position:relative;
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.hero-content{
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.logo{
width:70px;
}

.title-box{
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:40px;
margin:10px 0;
}

.tagline{
font-size:16px;
opacity:0.9;
}

button{
margin-top:15px;
padding:14px 30px;
background:#ef4444;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

/* SPORTS SECTION */

.sports-section{
padding:60px 20px;
text-align:center;
position:relative;
overflow:hidden;
}

/* animated paint splashes */

.splash{
position:absolute;
width:300px;
opacity:0.15;
animation:float 12s infinite linear;
}

.splash1{top:20%;left:10%;}
.splash2{top:60%;right:10%;animation-duration:15s;}
.splash3{bottom:10%;left:40%;animation-duration:18s;}

@keyframes float{

0%{transform:translateY(0px) rotate(0deg);}

50%{transform:translateY(-30px) rotate(10deg);}

100%{transform:translateY(0px) rotate(0deg);}

}

/* cards layout */

.cards{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
margin-top:40px;
}

/* sport cards */

.card{
background:white;
color:black;
padding:18px;
width:85%;
max-width:420px;
border-radius:12px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* footer */

footer{
text-align:center;
padding:30px;
background:#020617;
}

</style>

</head>

<body>

<!-- HERO HEADER -->

<header class="hero">

<video autoplay muted loop>
<source src="sports-video.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<img src="logo1.jpeg" class="logo">

<div class="title-box">

<h1>IMA Sports Fest</h1>

<p class="tagline">
Compete • Conquer • Celebrate
</p>

<button>Register Now</button>

</div>

<img src="logo2.jpeg" class="logo">

</div>

</header>

<!-- SPORTS EVENTS -->

<section class="sports-section">

<h2>Sports Events</h2>

<!-- paint splashes -->

<img src="https://pngimg.com/uploads/paint_splash/paint_splash_PNG64.png" class="splash splash1">

<img src="https://pngimg.com/uploads/paint_splash/paint_splash_PNG70.png" class="splash splash2">

<img src="https://pngimg.com/uploads/paint_splash/paint_splash_PNG63.png" class="splash splash3">

<div class="cards">

<div class="card">⚽ Football</div>

<div class="card">🏐 Volleyball</div>

<div class="card">🤾 Throwball</div>

<div class="card">🏃 Kho Kho</div>

<div class="card">🏀 Basketball</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>Designed by Suhas K N</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
