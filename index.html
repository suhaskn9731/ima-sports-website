<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Sports Fest</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>


<!-- INTRO SCREEN -->

<div id="intro">
<h1 class="intro-title">IMA SPORTS FEST</h1>
</div>


<!-- HERO SECTION -->

<section class="hero">

<video autoplay muted loop playsinline class="video-bg">
<source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<canvas id="particles"></canvas>


<div class="hero-content">

<div class="glass">

<h1 class="title spotlight-text">
IMA SPORTS FEST
</h1>

<p class="tagline">
Compete • Conquer • Celebrate
</p>

<a href="#events" class="btn">
Explore Events
</a>

</div>

</div>

<div class="scroll">↓</div>

</section>



<!-- EVENTS SECTION -->

<section id="events" class="events">

<h2>SPORTS EVENTS</h2>

<div class="events-grid">


<div class="event-card">

<img src="football.jpg">

<div class="event-info">
<h3>Football</h3>
<p class="price">₹500 Registration</p>

<button class="register-btn">
Register
</button>
</div>

</div>


<div class="event-card">

<img src="volleyball.jpg">

<div class="event-info">
<h3>Volleyball</h3>
<p class="price">₹400 Registration</p>

<button class="register-btn">
Register
</button>
</div>

</div>



<div class="event-card">

<img src="basketball.jpg">

<div class="event-info">
<h3>Basketball</h3>
<p class="price">₹500 Registration</p>

<button class="register-btn">
Register
</button>
</div>

</div>



<div class="event-card">

<img src="kho-kho.jpg">

<div class="event-info">
<h3>Kho Kho</h3>
<p class="price">₹300 Registration</p>

<button class="register-btn">
Register
</button>
</div>

</div>



<div class="event-card">

<img src="throwball.jpg">

<div class="event-info">
<h3>Throwball</h3>
<p class="price">₹350 Registration</p>

<button class="register-btn">
Register
</button>
</div>

</div>


</div>

</section>


<script src="script.js"></script>

</body>

</html>
